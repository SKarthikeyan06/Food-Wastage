<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>FoodBridge AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #ffffff;
      --bg2: #f8faf9;
      --bg3: #ffffff;
      --bg4: #f3f6f5;
      --green: #0f7a66;
      --green2: #2aa68a;
      --amber: #f59e0b;
      --red: #d94e4e;
      --blue: #0ea5e9;
      --text: #0b1a10;
      --text2: #52606d;
      --border: rgba(15, 20, 16, 0.06);
      --card: #ffffff;
      --card-h: rgba(15, 122, 102, 0.03);
      --ff: 'Syne', sans-serif;
      --fb: 'DM Sans', sans-serif;
      --r: 14px;
      --rs: 10px;
    }

    html {
      scroll-behavior: smooth
    }

    body {
      background: var(--bg2);
      color: var(--text);
      font-family: var(--fb);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 12px rgba(16, 24, 32, 0.08);
      border-bottom: 1px solid var(--border)
    }

    .logo {
      font-family: var(--ff);
      font-size: 20px;
      font-weight: 800;
      cursor: pointer
    }

    .logo span {
      color: var(--green)
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
      justify-content: flex-end
    }

    .role-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      text-transform: uppercase
    }

    .rb-donor {
      background: rgba(126, 200, 69, 0.15);
      color: var(--green);
      border: 1px solid rgba(126, 200, 69, 0.3)
    }

    .rb-ngo {
      background: rgba(90, 180, 232, 0.15);
      color: var(--blue);
      border: 1px solid rgba(90, 180, 232, 0.3)
    }

    .rb-admin {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber);
      border: 1px solid rgba(245, 166, 35, 0.3)
    }

    .rb-individual {
      background: rgba(232, 93, 74, 0.15);
      color: var(--red);
      border: 1px solid rgba(232, 93, 74, 0.3)
    }

    .nav-name {
      font-size: 14px;
      font-weight: 500
    }

    .btn-sm {
      padding: 8px 18px;
      border-radius: var(--rs);
      font-family: var(--ff);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.2s
    }

    .btn-logout {
      background: rgba(232, 93, 74, 0.1);
      color: var(--red);
      border: 1px solid rgba(232, 93, 74, 0.2)
    }

    .btn-logout:hover {
      background: rgba(232, 93, 74, 0.2)
    }

    /* ── PAGES ── */
    .page {
      display: none;
      min-height: 100vh
    }

    .page.active {
      display: block
    }

    /* ── AUTH PAGE ── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, rgba(15, 122, 102, 0.04) 0%, transparent 70%)
    }

    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 520px
    }

    .auth-logo {
      font-family: var(--ff);
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px
    }

    .auth-logo span {
      color: var(--green)
    }

    .auth-sub {
      text-align: center;
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 32px
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      border-radius: var(--rs);
      padding: 4px;
      margin-bottom: 28px
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--ff);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s
    }

    .auth-tab.active {
      background: var(--green);
      color: #0b0e09
    }

    .form-g {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px
    }

    .form-g label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.3px;
      text-transform: uppercase
    }

    .form-g input,
    .form-g select {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--text);
      font-family: var(--fb);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%
    }

    .form-g input:focus,
    .form-g select:focus {
      border-color: var(--green)
    }

    .form-g select option {
      background: #ffffff;
      color: var(--text)
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px
    }

    .btn-full {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #0b0e09;
      border: none;
      border-radius: var(--rs);
      font-family: var(--ff);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px
    }

    .btn-full:hover {
      background: var(--green2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(126, 200, 69, 0.3)
    }

    .demo-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: var(--text2);
      background: var(--bg2);
      border-radius: var(--rs);
      padding: 12px;
      line-height: 1.8
    }

    .demo-hint strong {
      color: var(--green)
    }

    /* ── MAIN LAYOUT ── */
    .main-wrap {
      padding: 80px 0 40px
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 65px;
      bottom: 0;
      width: 220px;
      background: transparent;
      border-right: 1px solid var(--border);
      padding: 24px 0;
      overflow-y: auto;
      z-index: 90
    }

    .sidebar-section {
      padding: 0 16px;
      margin-bottom: 8px
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 8px 12px;
      margin-bottom: 4px
    }

    .sidebar-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: var(--fb);
      font-size: 14px;
      font-weight: 400;
      cursor: pointer;
      border-radius: var(--rs);
      transition: all 0.2s;
      text-align: left
    }

    .sidebar-btn:hover,
    .sidebar-btn.active {
      background: var(--card-h);
      color: var(--text)
    }

    .sidebar-btn.active {
      border-left: 3px solid var(--green);
      color: var(--green)
    }

    .sidebar-icon {
      font-size: 16px;
      width: 20px;
      text-align: center
    }

    .content {
      margin-left: 220px;
      padding: 96px 40px 40px;
      max-width: 1200px
    }

    .page-title {
      font-family: var(--ff);
      font-size: clamp(28px, 3vw, 42px);
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .page-sub {
      color: var(--text2);
      font-size: 15px;
      margin-bottom: 32px
    }

    /* ── CARDS ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px
    }

    .card h3 {
      font-family: var(--ff);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border)
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px
    }

    .grid4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px
    }

    .gap20 {
      gap: 20px
    }

    /* ── STAT CARD ── */
    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px
    }

    .stat-icon {
      font-size: 24px;
      margin-bottom: 10px
    }

    .stat-val {
      font-family: var(--ff);
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      color: var(--green)
    }

    .stat-lbl {
      font-size: 12px;
      color: var(--text2);
      margin-top: 6px
    }

    /* ── FORM ── */
    .fgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .fgrid .full {
      grid-column: span 2
    }

    .inp,
    .sel,
    .ta {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      color: var(--text);
      font-family: var(--fb);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%
    }

    .inp:focus,
    .sel:focus,
    .ta:focus {
      border-color: var(--green)
    }

    .sel option {
      background: #ffffff;
      color: var(--text)
    }

    .ta {
      resize: vertical;
      min-height: 80px
    }

    .lbl {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      letter-spacing: 0.3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block
    }

    .fg {
      margin-bottom: 16px
    }

    .btn-primary {
      background: var(--green);
      color: #0b0e09;
      border: none;
      border-radius: var(--rs);
      font-family: var(--ff);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      cursor: pointer;
      transition: all 0.2s
    }

    .btn-primary:hover {
      background: var(--green2);
      transform: translateY(-2px)
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--rs);
      font-family: var(--ff);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 28px;
      cursor: pointer;
      transition: all 0.2s
    }

    .btn-outline:hover {
      border-color: var(--green);
      color: var(--green)
    }

    /* ── RESULT ── */
    .result-box {
      background: rgba(126, 200, 69, 0.06);
      border: 1px solid rgba(126, 200, 69, 0.25);
      border-radius: var(--r);
      padding: 28px;
      margin-top: 20px;
      animation: fadeUp 0.4s ease
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px
    }

    .rv {
      font-family: var(--ff);
      font-size: 28px;
      font-weight: 800;
      line-height: 1
    }

    .rl {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px
    }

    .risk-HIGH {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-family: var(--ff);
      font-size: 13px;
      font-weight: 700;
      background: rgba(232, 93, 74, 0.15);
      color: var(--red);
      border: 1px solid rgba(232, 93, 74, 0.3)
    }

    .risk-MEDIUM {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-family: var(--ff);
      font-size: 13px;
      font-weight: 700;
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber);
      border: 1px solid rgba(245, 166, 35, 0.3)
    }

    .risk-LOW {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 100px;
      font-family: var(--ff);
      font-size: 13px;
      font-weight: 700;
      background: rgba(126, 200, 69, 0.15);
      color: var(--green);
      border: 1px solid rgba(126, 200, 69, 0.3)
    }

    .rec-box {
      background: rgba(255, 255, 255, 0.03);
      border-radius: var(--rs);
      padding: 14px 16px;
      font-size: 14px;
      color: var(--text2)
    }

    .rec-box strong {
      color: var(--text)
    }

    .alert-soft {
      background: rgba(245, 166, 35, 0.06);
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: var(--rs);
      padding: 14px 18px;
      margin-top: 12px
    }

    .alert-hard {
      background: rgba(126, 200, 69, 0.06);
      border: 1px solid rgba(126, 200, 69, 0.3);
      border-radius: var(--rs);
      padding: 14px 18px;
      margin-top: 12px
    }

    .at {
      font-family: var(--ff);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .alert-soft .at {
      color: var(--amber)
    }

    .alert-hard .at {
      color: var(--green)
    }

    .atxt {
      font-size: 13px;
      color: var(--text2)
    }

    .mode-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(90, 180, 232, 0.1);
      color: var(--blue);
      border: 1px solid rgba(90, 180, 232, 0.2);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      margin-top: 4px;
      letter-spacing: 0.3px
    }

    /* ── TABLE ── */
    .tbl-wrap {
      overflow-x: auto;
      border-radius: var(--r);
      border: 1px solid var(--border)
    }

    table {
      width: 100%;
      border-collapse: collapse
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--text2);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      background: var(--bg3)
    }

    td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04)
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: var(--card-h)
    }

    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600
    }

    .pill-green {
      background: rgba(126, 200, 69, 0.15);
      color: var(--green)
    }

    .pill-amber {
      background: rgba(245, 166, 35, 0.15);
      color: var(--amber)
    }

    .pill-red {
      background: rgba(232, 93, 74, 0.15);
      color: var(--red)
    }

    .pill-blue {
      background: rgba(90, 180, 232, 0.15);
      color: var(--blue)
    }

    /* ── UPLOAD ZONE ── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--r);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s
    }

    .drop-zone:hover {
      border-color: var(--green);
      background: rgba(126, 200, 69, 0.03)
    }

    .drop-zone.drag {
      border-color: var(--green);
      background: rgba(126, 200, 69, 0.06)
    }

    /* ── PROGRESS BAR ── */
    .pbar-wrap {
      margin-bottom: 12px
    }

    .pbar-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      font-size: 13px
    }

    .pbar-val {
      font-weight: 600;
      color: var(--green)
    }

    .pbar-bg {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 100px;
      height: 7px
    }

    .pbar-fill {
      border-radius: 100px;
      height: 7px;
      transition: width 1s
    }

    /* ── NGO ALERT CARDS ── */
    .alert-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px;
      transition: all 0.3s
    }

    .alert-card:hover {
      border-color: rgba(126, 200, 69, 0.3)
    }

    .ac-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px
    }

    .ac-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px
    }

    .ac-meta-item {
      font-size: 13px;
      color: var(--text2)
    }

    .ac-meta-item strong {
      color: var(--text)
    }

    .ac-btns {
      display: flex;
      gap: 10px
    }

    .btn-accept {
      flex: 1;
      padding: 9px;
      text-align: center;
      background: rgba(126, 200, 69, 0.1);
      color: var(--green);
      border: 1px solid rgba(126, 200, 69, 0.25);
      border-radius: var(--rs);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--fb)
    }

    .btn-accept:hover {
      background: rgba(126, 200, 69, 0.2)
    }

    .btn-decline {
      flex: 1;
      padding: 9px;
      text-align: center;
      background: rgba(232, 93, 74, 0.08);
      color: var(--red);
      border: 1px solid rgba(232, 93, 74, 0.2);
      border-radius: var(--rs);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--fb)
    }

    .btn-decline:hover {
      background: rgba(232, 93, 74, 0.15)
    }

    /* ── MISC ── */
    .hidden {
      display: none !important
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px
    }

    .toast {
      position: fixed;
      top: 80px;
      right: 24px;
      z-index: 9999;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 16px 24px;
      font-size: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      animation: slideIn 0.3s ease;
      max-width: 380px
    }

    .toast.ok {
      border-color: rgba(126, 200, 69, 0.4)
    }

    .toast.err {
      border-color: rgba(232, 93, 74, 0.4)
    }

    .info-box {
      background: rgba(90, 180, 232, 0.06);
      border: 1px solid rgba(90, 180, 232, 0.2);
      border-radius: var(--rs);
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 20px
    }

    .info-box strong {
      color: var(--blue)
    }

    .section-gap {
      margin-bottom: 28px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(12px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    /* ═══ ORPHAN ALERT PANEL — Premium Design ═══ */
    .needy-alert-panel {
      margin-top: 24px;
      padding: 24px;
      background: linear-gradient(135deg, rgba(217, 78, 78, 0.06) 0%, rgba(245, 158, 11, 0.05) 100%);
      border: 1px solid rgba(217, 78, 78, 0.15);
      border-radius: var(--r);
      position: relative;
      overflow: hidden;
    }

    .needy-alert-panel::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(217, 78, 78, 0.06) 0%, transparent 60%);
      animation: pulseGlow 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    .needy-alert-panel .needy-title {
      font-family: var(--ff);
      font-size: 18px;
      font-weight: 800;
      color: var(--red);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .needy-alert-panel .needy-sub {
      color: var(--text2);
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.5;
      position: relative;
    }

    .needy-alert-panel .needy-fields {
      display: grid;
      gap: 10px;
      position: relative;
    }

    .needy-alert-panel .needy-fields input,
    .needy-alert-panel .needy-fields textarea {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(217, 78, 78, 0.15);
      border-radius: var(--rs);
      padding: 11px 14px;
      font-family: var(--fb);
      font-size: 14px;
      color: var(--text);
      outline: none;
      width: 100%;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }

    .needy-alert-panel .needy-fields input:focus,
    .needy-alert-panel .needy-fields textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(217, 78, 78, 0.08);
    }

    .btn-sos {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--red), #c0392b);
      color: #fff;
      border: none;
      border-radius: var(--rs);
      font-family: var(--ff);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 14px;
      position: relative;
      letter-spacing: 0.3px;
    }

    .btn-sos:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(217, 78, 78, 0.35);
    }

    .btn-sos:active {
      transform: translateY(0);
    }

    /* ═══ HAMBURGER MENU ═══ */
    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      z-index: 200;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      margin: 5px 0;
      border-radius: 2px;
      transition: all 0.3s;
    }

    /* ═══ RESPONSIVE — TABLET (≤1024px) ═══ */
    @media (max-width: 1024px) {
      .sidebar {
        width: 180px;
      }

      .content {
        margin-left: 180px;
        padding: 96px 20px 24px;
      }

      .grid4 {
        grid-template-columns: repeat(2, 1fr);
      }

      .grid3 {
        grid-template-columns: repeat(2, 1fr);
      }

      .nav {
        padding: 14px 20px;
      }
    }

    /* ═══ RESPONSIVE — MOBILE (≤768px) ═══ */
    @media (max-width: 768px) {
      .hamburger {
        display: block;
      }

      .sidebar {
        position: fixed;
        left: -260px;
        width: 240px;
        top: 60px;
        bottom: 0;
        background: var(--bg);
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
        transition: left 0.3s ease;
        z-index: 150;
      }

      .sidebar.open {
        left: 0;
      }

      .sidebar-overlay {
        display: none;
        position: fixed;
        top: 60px;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 140;
      }

      .sidebar-overlay.open {
        display: block;
      }

      .content {
        margin-left: 0;
        padding: 90px 16px 16px;
      }

      .grid4,
      .grid3,
      .grid2,
      .result-grid,
      .fgrid,
      .form-row {
        grid-template-columns: 1fr;
      }

      .fgrid .full {
        grid-column: span 1;
      }

      .nav {
        padding: 12px 16px;
      }

      .nav-right {
        gap: 8px;
      }

      .nav-name {
        display: none;
      }

      .role-badge {
        display: none;
      }

      .btn-sm {
        padding: 6px 12px;
        font-size: 12px;
      }

      .auth-box {
        padding: 24px 20px;
        border-radius: 14px;

      .auth-logo {

      }

      .page-title {

    /* ═══ RESPONSIVE — SMALL PHONE (≤480px) ═══ */
    @media (max-width: 480px) {

        padding: 12px;
      }

      }

      }

</head>

<body>

  <!-- ══════════════════════════════════════ -->

            <div class="form-g">
              <label>PASSWORD</label>

              <label>PHONE</label>

            instantly. <strong>No login needed.</strong></div>
          <div class="needy-fields">
            <input id="rn-location" placeholder="Location / Landmark (e.g. Opposite Central Station)" />
            <input id="rn-city" placeholder="City (e.g. Chennai)" />
            <textarea id="rn-desc" rows="2"
              placeholder="Describe the situation (age, condition, number of people...)"></textarea>
            <input id="rn-contact" placeholder="Your phone (optional, for NGO follow-up)" />

  <!-- ══════════════════════════════════════ -->
  <!-- MAIN APP PAGE -->
  <!-- ══════════════════════════════════════ -->
  <div id="page-app" class="page">

    <!-- NAV -->
    <nav class="nav">

                  <option value="donor">Donors</option>

    <!-- SIDEBAR -->

    <!-- CONTENT AREA -->
    <div class="content" id="content-area">
      <div style="padding-top:40px;text-align:center;color:var(--text2)">Loading...</div>
    </div>

  </div><!-- /page-app -->

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script>
    // ── SUPABASE CONFIG (inline - no .env needed) ──
    const SUPABASE_URL = 'https://lrcemdihdncmtfxqqgew.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxyY2VtZGloZG5jbXRmeHFxZ2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4NjE1MTQsImV4cCI6MjA4NjQzNzUxNH0.NmiOJZCvx0gvM7X5hJJoiaIrjK4OxmJDolZY93uSXkA';
    const API = 'http://localhost:5000/api';
    let currentUser = null;
    let currentSection = '';

    // Dynamic dropdown defaults (will load from DB)
    let eventTypes = ['Wedding', 'Corporate', 'Birthday', 'Social Gathering', 'Temple Festival', 'College Event'];
    let foodTypes = ['Rice/Biryani', 'Curry/Dal', 'Vegetables', 'Meat/Chicken', 'Sweets', 'Snacks', 'Bread/Roti'];

    // ── Auth ───────────────────────────────────────────────────
    function authTab(t) {
      document.getElementById('auth-login').classList.toggle('hidden', t !== 'login');
      document.getElementById('auth-register').classList.toggle('hidden', t !== 'register');
      document.querySelectorAll('.auth-tab').forEach((b, i) => {
        b.classList.toggle('active', ['login', 'register'][i] === t);
      });
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value;
      const pass = document.getElementById('l-pass').value;
      if (!email || !pass) return toast('Enter email and password', 'err');
      const btn = document.getElementById('login-btn');
      btn.innerHTML = '<span class="spinner"></span>Logging in...'; btn.disabled = true;
      try {
        const r = await api('/login', { email, password: pass });
        if (r.error) { toast(r.error, 'err'); }
        else { currentUser = r.user; initApp(); }
      } catch (e) { toast('Backend not running - using demo mode', 'err'); demoLogin(email); }
      btn.innerHTML = 'Login'; btn.disabled = false;
    }

    function demoLogin(email) {
      const demos = {
        'donor@demo.com': { id: 'd1', name: 'Demo Donor', role: 'donor', email: 'donor@demo.com' },
        'ngo@demo.com': { id: 'n1', name: 'Hope NGO', role: 'ngo', email: 'ngo@demo.com' },
        'admin@demo.com': { id: 'a1', name: 'Admin', role: 'admin', email: 'admin@demo.com' },
        'user@demo.com': { id: 'u1', name: 'Demo User', role: 'individual', email: 'user@demo.com' },
      };
      const u = demos[email];
      if (u) { currentUser = u; initApp(); }
      else toast('Unknown demo account', 'err');
    }

    async function doRegister() {
      const d = {
        full_name: document.getElementById('r-name').value,
        email: document.getElementById('r-email').value,
        password: document.getElementById('r-pass').value,
        role: document.getElementById('r-role').value,
        phone: document.getElementById('r-phone').value,
        city: document.getElementById('r-city').value,
        organization: document.getElementById('r-org').value,
      };
      if (!d.full_name || !d.email || !d.password) return toast('Fill required fields', 'err');
      if (d.password.length < 6) return toast('Password min 6 chars', 'err');
      const btn = document.getElementById('reg-btn');
      btn.innerHTML = '<span class="spinner"></span>Creating...'; btn.disabled = true;
      try {
        const r = await api('/register', d);
        if (r.error) toast(r.error, 'err');
        else {
          currentUser = r.user;
          initApp();
          if (r.status && r.status.includes('demo')) {
            toast('Registered in DEMO MODE (Local only, DB disconnected)', 'err');
          } else {
            toast('Account created! Welcome');
          }
        }
      } catch (e) {
        currentUser = { id: 'new1', name: d.full_name, role: d.role, email: d.email };
        initApp(); toast('Registered (demo mode)');
      }
      btn.innerHTML = 'Create Account'; btn.disabled = false;
    }

    async function doReportNeedy() {
      const location = document.getElementById('rn-location').value.trim();
      const city = document.getElementById('rn-city').value.trim();
      const desc = document.getElementById('rn-desc').value.trim();
      const contact = document.getElementById('rn-contact').value.trim();
      if (!desc) return toast('Please describe the situation', 'err');
      if (!city && !location) return toast('Enter a city or location', 'err');

      const btn = document.getElementById('rn-btn');
      btn.innerHTML = '<span class="spinner"></span>Sending alert...'; btn.disabled = true;

      let data;
      try {
        data = await api('/report_needy', { location, city, description: desc, contact });
      } catch (e) {
        data = {
          status: "Alert sent (demo)",
          nearby_ngos: [
            { name: "Annadhanam Trust", city: city || "Chennai", distance_km: 2.3, phone: "9876500001" },
            { name: "Hope Shelter", city: city || "Chennai", distance_km: 4.1, phone: "9876500002" },
          ],
          message: "Alert sent to 2 nearby NGOs (demo mode)"
        };
      }

      const resultDiv = document.getElementById('rn-result');
      const ngosHtml = (data.nearby_ngos || []).length
        ? data.nearby_ngos.map(n => `<div style="padding:8px 12px;background:white;border-radius:8px;margin-top:6px;font-size:13px;border:1px solid var(--border)">
              <strong>${n.name}</strong> · 📍 ${n.distance_km} km · 📞 ${n.phone || 'N/A'} · ${n.city}
            </div>`).join('')
        : '<div style="font-size:13px;color:var(--text2);margin-top:6px">No specific NGOs found, but a broadcast alert was sent to all NGOs in the area.</div>';

      resultDiv.innerHTML = `
          <div style="padding:14px;background:rgba(15,122,102,0.1);border-radius:var(--rs);border:1px solid rgba(15,122,102,0.2)">
            <div style="font-weight:700;color:var(--green);font-size:14px;margin-bottom:6px">✅ ${data.message || 'Alert sent!'}</div>
            <div style="font-size:13px;color:var(--text2);margin-bottom:8px">Nearest NGOs who can respond:</div>
            ${ngosHtml}
          </div>`;
      resultDiv.style.display = 'block';

      btn.innerHTML = 'Send Alert to Nearest NGOs'; btn.disabled = false;
      toast('Alert sent to nearby NGOs!');
    }

    async function doLogout() {
      try { await api('/logout', {}, 'POST'); } catch (e) { }
      currentUser = null;
      document.getElementById('page-auth').classList.add('active');
      document.getElementById('page-app').classList.remove('active');
    }

    // ── App Init ──────────────────────────────────────────────
    async function initApp() {
      document.getElementById('page-auth').classList.remove('active');
      document.getElementById('page-app').classList.add('active');
      const role = currentUser.role;
      document.getElementById('nav-name').textContent = currentUser.name;
      const rb = document.getElementById('nav-role-badge');
      rb.textContent = role.toUpperCase();
      rb.className = `role-badge rb-${role}`;

      // Load user full details and dropdowns from DB
      await loadUserProfile();
      await loadDynamicDropdowns();

      buildSidebar(role);
      // Initialize notifications (polling + admin send UI)
      initNotifications();
      // Default section by role
      const defaults = { donor: 'predict', ngo: 'alerts', individual: 'explore', admin: 'admin-dash', guest: 'predict' };
      showSection(defaults[role] || 'predict');
    }

    function guestLogin() {
      currentUser = { id: 'guest', name: 'Guest User', role: 'guest', email: '' };
      initApp();
    }

    // Load user profile for pre-filling forms
    async function loadUserProfile() {
      try {
        const user = await api('/me', {}, 'GET');
        if (user && user.name) currentUser.name = user.name;
        document.getElementById('nav-name').textContent = currentUser.name;
      } catch (e) {
        // Use session user name if API fails
      }
    }

    // Load dynamic dropdowns from admin config (if available)
    async function loadDynamicDropdowns() {
      try {
        // Try to fetch from API
        const [foods, events] = await Promise.all([
          api('/config/food-types', {}, 'GET').catch(() => foodTypes),
          api('/config/event-types', {}, 'GET').catch(() => eventTypes)
        ]);

        // assign correctly: foods -> foodTypes, events -> eventTypes
        if (Array.isArray(foods) && foods.length > 0) foodTypes = foods;
        if (Array.isArray(events) && events.length > 0) eventTypes = events;

        window.dropdownConfig = { eventTypes, foodTypes };
        console.log('✅ Dropdowns loaded:', { eventTypes, foodTypes });
      } catch (e) {
        // Use defaults
        window.dropdownConfig = { eventTypes, foodTypes };
        console.log('Using default dropdowns');
      }
    }

    function buildSidebar(role) {
      const menus = {
        donor: [
          { icon: '', label: 'AI Prediction', id: 'predict' },
          { icon: '', label: 'Confirm Actual', id: 'confirm' },
          { icon: '', label: 'Photo Check', id: 'photo' },
          { icon: '', label: 'My Events', id: 'my-events' },
          { icon: '', label: 'My Impact', id: 'my-impact' },
          { icon: '', label: 'Nearest NGOs', id: 'nearest-ngos' },
        ],
        ngo: [
          { icon: '', label: 'Live Alerts', id: 'alerts' },
          { icon: '', label: 'Pickup History', id: 'pickup-history' },
          { icon: '', label: 'Register NGO', id: 'ngo-register' },
          { icon: '', label: 'NGO Impact', id: 'ngo-impact' },
          { icon: '', label: 'Nearest NGOs', id: 'nearest-ngos' },
        ],
        individual: [
          { icon: '', label: 'Find Surplus', id: 'explore' },
          { icon: '', label: 'Impact Board', id: 'impact-board' },
          { icon: '', label: 'Nearest NGOs', id: 'nearest-ngos' },
        ],
        guest: [
          { icon: '', label: 'AI Prediction', id: 'predict' },
          { icon: '', label: 'Live Alerts', id: 'alerts' },
          { icon: '', label: 'Share Feedback', id: 'guest-feedback' },
          { icon: '', label: 'Nearest NGOs', id: 'nearest-ngos' },
          { icon: '', label: 'Report Needy', id: 'report-needy' },
        ],
        admin: [
          { icon: '', label: 'Dashboard', id: 'admin-dash' },
          { icon: '', label: 'All Users', id: 'admin-users' },
          { icon: '', label: 'All Events', id: 'admin-events' },
          { icon: '', label: 'Upload Dataset', id: 'admin-upload' },
          { icon: '', label: 'Training Data', id: 'admin-training' },
          { icon: '', label: 'Food Types', id: 'admin-food-types' },
          { icon: '', label: 'Event Types', id: 'admin-event-types' },
          { icon: '', label: 'Nearest NGOs', id: 'nearest-ngos' },
        ],
      };
      const items = menus[role] || [];
      document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-label">${role === 'admin' ? 'Admin Panel' : role === 'ngo' ? 'NGO Portal' : role === 'donor' ? 'Donor Portal' : 'User Portal'}</div>
      ${items.map(m => `
        <button class="sidebar-btn" id="sb-${m.id}" onclick="showSection('${m.id}')">
          <span class="sidebar-icon">${m.icon}</span>${m.label}
        </button>
      `).join('')}
    </div>`;
    }

    function showSection(id) {
      currentSection = id;
      document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
      const sb = document.getElementById('sb-' + id);
      if (sb) sb.classList.add('active');
      const fn = {
        'predict': renderPredict,
        'confirm': renderConfirm,
        'photo': renderPhoto,
        'my-events': renderMyEvents,
        'my-impact': renderMyImpact,
        'alerts': renderAlerts,
        'pickup-history': renderPickupHistory,
        'ngo-register': renderNGORegister,
        'ngo-impact': renderNGOImpact,
        'explore': renderExplore,
        'impact-board': renderImpactBoard,
        'admin-dash': renderAdminDash,
        'admin-users': renderAdminUsers,
        'admin-events': renderAdminEvents,
        'admin-upload': renderAdminUpload,
        'admin-training': renderAdminTraining,
        'admin-food-types': renderAdminFoodTypes,
        'admin-event-types': renderAdminEventTypes,
        'guest-feedback': renderGuestFeedback,
        'nearest-ngos': renderNearestNGOs,
        'report-needy': renderReportNeedy,
      }[id];
      if (fn) fn();
      else document.getElementById('content-area').innerHTML = `<div class="page-title">Coming Soon</div>`;

      // Close sidebar on mobile after clicking
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      if (sidebar && sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');

      if (method !== 'GET') opts.body = JSON.stringify(body);
      const r = await fetch(API + path, opts);

    // ── Notifications (poll + basic send for admin) ─────────────────
    let notificationsPoll = null;
    function initNotifications() {
      try { fetchNotifications(); if (notificationsPoll) clearInterval(notificationsPoll); notificationsPoll = setInterval(fetchNotifications, 10000); }

      try { if (currentUser && (currentUser.role === 'admin' || currentUser.role === 'admin')) document.getElementById('notif-send-area').classList.remove('hidden'); }

    async function fetchNotifications() {
      try {
        const res = await api('/notifications', {}, 'GET');
        if (Array.isArray(res)) renderNotifications(res);
      } catch (e) { console.log('Notifications fetch failed', e); }

    function renderNotifications(notifs) {
      const list = document.getElementById('notif-list');
      if (!notifs || notifs.length === 0) { list.innerHTML = '<div style="color:var(--text2)">No notifications</div>'; document.getElementById('notif-count').style.display = 'none'; return; }

      const userReadCache = JSON.parse(localStorage.getItem('readNotifs_' + currentUser.id) || '[]');

      // Filter out notifications that are globally read OR locally marked as read
      const unreadNotifs = notifs.filter(n => !n.is_read && !userReadCache.includes(n.id + ''));
      const unread = unreadNotifs.length;

      const html = notifs.map(n => {
        const title = n.title || (n.message || 'Notification').slice(0, 48);
        const msg = n.message || '';
        const time = n.created_at ? new Date(n.created_at).toLocaleString() : '';
        const isRead = n.is_read || userReadCache.includes(n.id + '');
        const badge = isRead ? '' : '<span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-right:6px"></span>';

        return `<div style="padding:8px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px; ${isRead ? 'opacity:0.6' : ''}">
      <div style="flex:1">
        <div style="font-weight:700;margin-bottom:6px">${badge}${title}</div>
        <div style="color:var(--text2);font-size:13px">${msg}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px">${time}</div>
      </div>
      <div style="margin-left:8px;white-space:nowrap">
        ${!isRead ? `<button class="btn-sm" onclick="markAsReadLocally('${n.id}')">Mark</button>` : `<span style="font-size:12px;color:var(--text2)">Read</span>`}
      </div>
    </div>`;
      }).join('');
      list.innerHTML = html;
      const c = document.getElementById('notif-count');
      if (unread > 0) { c.textContent = unread; c.style.display = 'inline-block'; } else { c.style.display = 'none'; }
    }

    function toggleNotifications() {
      const d = document.getElementById('notif-dropdown');
      d.style.display = (d.style.display === 'block') ? 'none' : 'block';
      if (d.style.display === 'block') fetchNotifications();
    }

    async function markAsReadLocally(id) {
      if (!currentUser) return;

      // Store in local storage per user to avoid marking it read for ALL NGOs
      const key = 'readNotifs_' + currentUser.id;
      let readCache = JSON.parse(localStorage.getItem(key) || '[]');
      if (!readCache.includes(id + '')) {
        readCache.push(id + '');
        localStorage.setItem(key, JSON.stringify(readCache));
      }
      toast('Marked as read');
      fetchNotifications();
    }

    async function markAsRead(id) {
      try { await api('/notifications/mark_read', { id }, 'POST'); fetchNotifications(); }
      catch (e) { toast('Could not mark read', 'err'); }
    }

    async function markAllRead() {
      if (!currentUser) return;

      // Instead of hitting the DB to mark all read (which clears for everyone),
      // we'll update our local storage trick to record them all.
      try {
        const res = await api('/notifications', {}, 'GET');
        if (Array.isArray(res)) {
          const key = 'readNotifs_' + currentUser.id;
          const ids = res.map(n => n.id + '');
          localStorage.setItem(key, JSON.stringify(ids));
        }
        fetchNotifications();
      } catch (e) { toast('Could not mark all read', 'err'); }
    }

    async function sendNotification() {
      const msg = document.getElementById('notif-msg').value.trim();
      const to = document.getElementById('notif-to').value;
      if (!msg) return toast('Enter message', 'err');
      try {
        await api('/notifications/send', { to_role: to, message: msg }, 'POST');
        document.getElementById('notif-msg').value = '';
        toast('Notification sent');
        fetchNotifications();
      } catch (e) { toast('Send failed', 'err'); }
    }

    function localPredict(p) {
      // Local formula fallback
      const pc = { 'Rice/Biryani': 175, 'Curry/Dal': 110, 'Vegetables': 90, 'Meat/Chicken': 135, 'Sweets': 65, 'Snacks': 75, 'Bread/Roti': 120 };
      const att = { 'Wedding': 0.87, 'Corporate': 0.92, 'Birthday': 0.82, 'Social Gathering': 0.78, 'Temple Festival': 0.75, 'College Event': 0.85 };
      const buf = { 'Wedding': 1.10, 'Corporate': 1.05, 'Birthday': 1.06, 'Social Gathering': 1.05, 'Temple Festival': 1.08, 'College Event': 1.07 };
      const wBase = { 'Wedding': 0.25, 'Corporate': 0.15, 'Birthday': 0.22, 'Social Gathering': 0.18, 'Temple Festival': 0.20, 'College Event': 0.17 };
      const wMeth = { 'Buffet': 1.15, 'Sit-down Dinner': 1.00, 'Finger Food': 0.85, 'Thali': 0.95 };
      const wPrice = { 'High': 1.30, 'Moderate': 1.00, 'Low': 0.80 };

      const expected = Math.round(p.guests * (att[p.event_type] || 0.85));
      const optimal = +((expected * (pc[p.food_type] || 120) / 1000) * (buf[p.event_type] || 1.06)).toFixed(1);
      const q = p.qty_prepared ? +p.qty_prepared : optimal;
      const wf = (wBase[p.event_type] || 0.18) * (wMeth[p.prep_method] || 1.00) * (wPrice[p.pricing] || 1.00);
      const waste = +(q * wf).toFixed(1);
      const wpct = +(waste / q * 100).toFixed(1);
      const risk = wpct > 20 ? 'HIGH' : wpct > 12 ? 'MEDIUM' : 'LOW';
      const savings = Math.max(0, +(q - optimal).toFixed(1));
      return {
        optimal_quantity_kg: optimal, predicted_wastage_kg: waste, wastage_pct: wpct,
        risk_level: risk, confidence: 65, prediction_mode: 'Formula (Demo)',
        data_points_used: 0, savings_if_optimal_kg: savings,
        recommendation: `Prepare ${optimal}kg for ~${expected} expected guests. Estimated waste: ${waste}kg (${wpct}%).`,
        event_id: null
      };
    }

    function handleUploadDrop(e, type) {
      e.preventDefault();
      document.getElementById('dz-' + type).classList.remove('drag');
      const f = e.dataTransfer.files[0];
      if (f) processUpload(f, type);
    }

    function uploadDataset(e, type) { processUpload(e.target.files[0], type); }

    async function processUpload(file, type) {
      const resultId = type === 'tn' ? 'tn-result' : 'orig-result';
      const resultEl = document.getElementById(resultId);
      resultEl.innerHTML = `<div style="margin-top:12px;color:var(--text2);font-size:14px"><span class="spinner"></span>Uploading ${file.name}...</div>`;
      resultEl.classList.remove('hidden');

      const form = new FormData();
      form.append('file', file);
      form.append('dataset_type', type);

      try {
        const r = await fetch(API + '/admin/upload_dataset', {
          method: 'POST', body: form, credentials: 'include'
        });
        const data = await r.json();
        resultEl.innerHTML = `
    <div class="alert-hard" style="margin-top:12px;padding:14px 18px;">
      <div class="at">${data.inserted} rows uploaded</div>
      <div class="atxt">${data.message}</div>
    </div>`;
        toast(`${data.inserted} rows added to Supabase`);
      } catch (e) {
        // Demo mode simulation
        const text = await file.text();
        const lines = text.trim().split('\n').length - 1;
        resultEl.innerHTML = `
    <div class="alert-hard" style="margin-top:12px;padding:14px 18px;">
      <div class="at">${lines} rows ready (demo mode)</div>
      <div class="atxt">Backend not running. In production this would insert ${lines} rows into ${type === 'tn' ? 'tn_food_surplus_dataset' : 'original_food_dataset'} table in Supabase.</div>
    </div>`;
        toast(`${lines} rows detected. Start backend to actually upload.`);
      }
    }

        res.classList.remove('hidden');
